<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Elsafty - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            scroll-behavior: smooth;
            background-color: #020617;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(20vw, 20vh) scale(1.2); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .snap-y { scroll-snap-type: y mandatory; }
        .snap-start { scroll-snap-align: start; }
    </style>
</head>
<body>
    <div class="bg-animate">
        <div class="blob w-96 h-96 bg-violet-600/30 top-[-10%] left-[-10%]"></div>
        <div class="blob w-[500px] h-[500px] bg-blue-600/20 bottom-[-10%] right-[-10%]" style="animation-delay: -5s;"></div>
        <div class="blob w-80 h-80 bg-indigo-500/20 top-[40%] left-[30%]" style="animation-delay: -10s;"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name.toLowerCase());
                    if (className) i.className = className;
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({
                        attrs: { class: className },
                        nameAttr: 'data-lucide',
                        icons: window.lucide.icons
                    });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [activeSection, setActiveSection] = useState(0);
            
            const userData = {
                name: "Mohamed Elsafty",
                email: "mohamedalexstudy@gmail.com",
                phone: "01146399477",
                ytLink: "https://www.youtube.com/@channel-clash-craft",
                githubLink: "https://github.com/Mohamedelsafty5",
                waLink: "https://wa.me/201146399477",
                // This points to the image you will upload to GitHub
                profilePic: "profile.jpg", 
                about: "I am an 18-year-old engineering student at Alexandria Faculty of Engineering. My journey is defined by a deep curiosity for how things work—whether it's the complex mechanics of an engine, the intricate circuitry of a custom-built PC, or the storytelling flow of a high-production video.",
                courses: [
                    { title: "DECI Lv1", issuer: "Udacity", details: "Basic computing & networks", link: "https://drive.google.com/file/d/1J_92AAKtByPYBviC3JhWsZOW93F5liuV/view?usp=sharing" },
                    { title: "DECI Lv2", issuer: "Udacity", details: "Advanced Python & Web Design", link: "https://drive.google.com/file/d/1hTwR3v2UA53-gODiaLwF2ryQhkHhEbUN/view?usp=sharing" },
                    { title: "DEPI Media Production", issuer: "DEPI", details: "STILL IN PROGRESS", link: "#" },
                    { title: "AWS AI Foundations", issuer: "Amazon", details: "AI Basics & Cloud", link: "https://drive.google.com/file/d/1sus5iOKG0uTIJn1REk-0KNV2BvLAzl3D/view?usp=sharing" },
                    { title: "IBM Emerging Tech", issuer: "IBM", details: "Advanced computing systems", link: "https://drive.google.com/file/d/1Uy1gebvFCD8iCJzBoUbkCtWHTxr-WQs2/view?usp=sharing" },
                    { title: "All Certificates", issuer: "Archive", details: "View full collection", link: "https://drive.google.com/drive/folders/1Gkx80Bs3j4-qHsve2cGys1yxsahAeqcI?usp=sharing", highlight: true }
                ],
                projects: [
                    { name: "Interactive Python Game", type: "Software", desc: "Choice-based narrative logic.", link: "https://drive.google.com/file/d/1O0ITIxDxZUPRDRuwLoK6Ot91TBbzwA5m/view?usp=sharing" },
                    { name: "Media & Content Creation", type: "Portfolio", desc: "Professional video and graphic work.", link: "https://drive.google.com/drive/folders/1JHHaK5b-Ufb87DgxMbebpfT8lCMpT-nY?usp=sharing" },
                    { name: "Clash Craft YT", type: "Channel", desc: "My primary content platform.", link: "https://www.youtube.com/@channel-clash-craft" },
                    { name: "Other Projects", type: "Archive", desc: "Hardware & misc explorations.", link: "https://drive.google.com/drive/folders/11yhcV8lQy3ThGtOJBIR3dgWszrwJvNyE?usp=sharing" }
                ]
            };

            return (
                <div className="h-screen w-full flex flex-col md:flex-row overflow-hidden relative">
                    <nav className="fixed right-8 top-1/2 -translate-y-1/2 z-50 hidden md:flex flex-col gap-6">
                        {[0,1,2,3,4].map((i) => (
                            <button key={i} onClick={() => document.getElementById(`section-${i}`).scrollIntoView({behavior:'smooth'})}
                                className={`w-1 h-8 rounded-full transition-all duration-500 ${activeSection === i ? 'bg-violet-400 w-2 shadow-[0_0_15px_#a78bfa]' : 'bg-white/20'}`} />
                        ))}
                    </nav>

                    <div className="flex-1 overflow-y-auto snap-y snap-mandatory h-full no-scrollbar" 
                        onScroll={(e) => setActiveSection(Math.round(e.target.scrollTop / window.innerHeight))}>
                        
                        <section id="section-0" className="h-screen snap-start flex items-center justify-center p-8">
                            <div className="max-w-7xl w-full grid md:grid-cols-2 gap-8 items-center">
                                <div className="order-2 md:order-1 space-y-6">
                                    <h1 className="text-7xl md:text-9xl font-black uppercase tracking-tighter leading-[0.85] text-white">
                                        MOHAMED<br/>
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 via-indigo-400 to-blue-400">ELSAFTY</span>
                                    </h1>
                                    <p className="text-slate-400 text-xl md:text-2xl leading-relaxed max-w-xl font-light">
                                        {userData.about}
                                    </p>
                                </div>
                                <div className="order-1 md:order-2 flex justify-center md:justify-end">
                                    <div className="relative group">
                                        <div className="absolute -inset-4 bg-gradient-to-tr from-violet-600 to-blue-600 rounded-[4rem] blur-2xl opacity-30 group-hover:opacity-50 transition duration-1000"></div>
                                        <div className="glass p-4 rounded-[4rem]">
                                            <img src={userData.profilePic} alt="Mohamed" 
                                                onError={(e) => { e.target.src = "https://via.placeholder.com/400x400/1e293b/a78bfa?text=Photo+Coming+Soon"; }}
                                                className="w-64 h-64 md:w-96 md:h-96 object-cover rounded-[3rem] shadow-2xl" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section id="section-1" className="h-screen snap-start flex items-center justify-center p-8">
                            <div className="max-w-7xl w-full">
                                <div className="grid md:grid-cols-3 gap-8">
                                    <div className="md:col-span-1 py-12">
                                        <h2 className="text-5xl font-black text-white mb-6 tracking-tighter">CERTIFIED<br/><span className="text-violet-400">EXCELLENCE</span></h2>
                                        <div className="glass p-8 rounded-3xl border-l-4 border-l-violet-500">
                                            <h3 className="text-xl font-bold text-white">Alexandria University</h3>
                                            <p className="text-violet-400">Engineering Student</p>
                                            <p className="text-slate-500 text-sm mt-4">Mechanical Engineering Track<br/>2026 — 2029</p>
                                        </div>
                                    </div>
                                    <div className="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {userData.courses.map((c, i) => (
                                            <a key={i} href={c.link} target="_blank" className={`glass p-6 rounded-3xl transition-all hover:-translate-y-1 hover:bg-white/10 group ${c.highlight ? 'border-violet-500/50 bg-violet-500/5' : ''}`}>
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="text-[10px] font-black tracking-widest text-violet-400 uppercase">{c.issuer}</span>
                                                    <Icon name="ExternalLink" className="w-4 h-4 text-slate-600 group-hover:text-white" />
                                                </div>
                                                <h4 className="font-bold text-white text-lg">{c.title}</h4>
                                                <p className="text-xs text-slate-500 mt-2">{c.details}</p>
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section id="section-2" className="h-screen snap-start flex items-center justify-center p-8">
                            <div className="max-w-7xl w-full">
                                <div className="flex justify-between items-end mb-12">
                                    <h2 className="text-6xl font-black text-white">PROJECT<br/><span className="text-blue-400">VAULT</span></h2>
                                    <div className="text-slate-500 hidden md:block pb-2">03 / 05 — EXPERIENCES</div>
                                </div>
                                <div className="grid md:grid-cols-4 gap-4">
                                    {userData.projects.map((p, i) => (
                                        <a key={i} href={p.link} target="_blank" className="glass p-8 rounded-[2.5rem] hover:bg-white/10 transition-all group h-72 flex flex-col justify-between">
                                            <div>
                                                <div className="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center mb-6">
                                                    <Icon name="Folder" className="w-5 h-5 text-blue-400" />
                                                </div>
                                                <h4 className="text-xl font-bold text-white mb-2">{p.name}</h4>
                                                <p className="text-slate-500 text-sm leading-tight">{p.desc}</p>
                                            </div>
                                            <div className="flex items-center gap-2 text-[10px] font-black text-blue-400 uppercase tracking-widest group-hover:gap-4 transition-all">
                                                Explore Case <Icon name="ArrowRight" className="w-3 h-3" />
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <section id="section-3" className="h-screen snap-start flex items-center justify-center p-8">
                            <div className="max-w-7xl w-full grid grid-cols-2 md:grid-cols-4 gap-4">
                                {[
                                    { n: 'Video Editing', i: 'Video', d: 'Premiere Pro Expert' },
                                    { n: 'Thumbnails', i: 'Palette', d: 'Photoshop Specialist' },
                                    { n: 'PC Building', i: 'Cpu', d: 'High-End Custom Rigs' },
                                    { n: 'Troubleshooting', i: 'Wrench', d: 'Software & Hardware' }
                                ].map((s, idx) => (
                                    <div key={idx} className="glass p-12 rounded-[3rem] text-center hover:bg-white/5 transition-all">
                                        <div className="w-20 h-20 glass rounded-3xl mx-auto mb-8 flex items-center justify-center">
                                            <Icon name={s.i} className="w-8 h-8 text-white" />
                                        </div>
                                        <h3 className="font-bold text-white text-xl mb-2">{s.n}</h3>
                                        <p className="text-slate-500 text-xs uppercase tracking-widest">{s.d}</p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section id="section-4" className="h-screen snap-start flex items-center justify-center p-8">
                            <div className="max-w-5xl w-full text-center space-y-16">
                                <div className="space-y-4">
                                    <h2 className="text-7xl md:text-9xl font-black text-white leading-none tracking-tighter italic">LET'S<br/>CONNECT</h2>
                                    <p className="text-violet-300 text-2xl font-light">"Wishing to work with you on your next great project!"</p>
                                </div>

                                <div className="flex flex-wrap justify-center gap-4">
                                    <a href={`mailto:${userData.email}`} className="glass w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center hover:bg-white/10 transition-all hover:scale-110">
                                        <Icon name="Mail" className="w-8 h-8 text-white" />
                                    </a>
                                    <a href={userData.waLink} target="_blank" className="glass w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center hover:bg-green-500/20 transition-all hover:scale-110">
                                        <svg className="w-8 h-8 fill-white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                    </a>
                                    <a href={userData.ytLink} target="_blank" className="glass w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center hover:bg-red-500/20 transition-all hover:scale-110">
                                        <Icon name="Youtube" className="w-8 h-8 text-white" />
                                    </a>
                                    <a href={userData.githubLink} target="_blank" className="glass w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center hover:bg-slate-500/20 transition-all hover:scale-110">
                                        <Icon name="Github" className="w-8 h-8 text-white" />
                                    </a>
                                </div>
                                <div className="text-slate-500 text-sm font-bold tracking-[0.5em] uppercase">Phone: {userData.phone}</div>
                            </div>
                        </section>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
